# Render.com Blueprint — Deploys both the API and the Celery worker
# from the same backend/ Dockerfile.
# Docs: https://docs.render.com/infrastructure-as-code
#
# Usage:
#   1. Push this file to your repo root.
#   2. In the Render Dashboard → "Blueprints" → connect this repo.
#   3. Render will detect both services automatically.
#   4. Add your environment variables (or use an envGroup).

services:
  # ── Web Service (FastAPI) ──────────────────────────────────────────
  - type: web
    name: hyve-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter        # adjust to your Render plan
    envVars:
      - key: OPENAI_API_KEY
        sync: false      # set manually in Render dashboard
      - key: LLM_PROVIDER
        value: openai
      - key: REDIS_URL
        sync: false      # your Upstash rediss:// URL — set in dashboard
      - key: DATABASE_URL
        sync: false      # your Neon Postgres URL — set in dashboard
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CANOPY_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: HF_TOKEN
        sync: false

  # ── Background Worker (Celery) ─────────────────────────────────────
  - type: worker
    name: hyve-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter        # adjust to your Render plan
    # Override the Dockerfile CMD to start Celery instead of uvicorn
    dockerCommand: celery -A worker.celery_app worker --loglevel=info
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CANOPY_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: HF_TOKEN
        sync: false
