server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 6m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # React SPA: serve static files, fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for all API calls.
    # Strips the /api prefix: /api/products -> http://backend:8000/products
    # proxy_buffering off: required for SSE (/api/products/*/status/stream)
    #   and streaming chat (/api/products/*/chat) to work without Nginx buffering
    #   the response and breaking the real-time stream.
    # Timeout 180s: Playwright scraping + GPT-4o-mini extraction can take 60-120s;
    #   Nginx's default 60s would cause a 504 Gateway Timeout.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;

        # Required for SSE and streaming responses
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Proxy the OpenAPI spec so SwaggerUI (/api/docs) can load it.
    # SwaggerUI requests /openapi.json as an absolute path; without this rule
    # the catch-all location / would return index.html instead of JSON.
    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy for uploaded product images served by FastAPI StaticFiles.
    # backend/core/images.py stores uploads at /app/static/product-images/
    # and constructs URLs as {BACKEND_URL}/static/product-images/<filename>.
    # Nginx intercepts /static/ here so the browser can reach them via port 80.
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
